<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*adjacent sibling Selector: used to select directly adjacent elements*/
        ol + h1 {
            background-color: lightblue;
            color: sienna;
        }
        /*descendant selector : used to target or indirect child elements*/
        ul p{
            color:aliceblue;
            background-color: blueviolet;
        }

        h4>p{
            color: red;
            background-color: lightpink
        }
        /*child selector*/
        ol>li{
            margin: 30px;
            background-color: lightgray;
        }
        /*general sibling selector (tilt operator): used to select direct and indirect siblings*/
        ol~h1{
            background-color: lightgreen;
            color: darkgreen;
        }

        /*Pseudo class selector*/
        body>h1:first-child{
            background-color: lightcoral;
            color: white;
        }
    </style>
</head>
<body>
    <h1> Ordered List
    </h1>
    <ol> <li>lists-1</li>
        <li>lists-2</li>
        <li>lists-3</li>
        <li>lists-4</li>
    </ol>
    <h1> Unordered List
    </h1>
    <ul>
        <li>
            <h4></h4>
        </li>
        <li>Unordered list items</li>
        <li>Unordered list items</li>
        <li>Unordered list items</li>
    </ul>
    <h1>
        Heading in 3rd position
    </h1>
    <h3>
            <h4> <p> Heading 4 </p> </h4>

    </h3>
</body>
</html>
