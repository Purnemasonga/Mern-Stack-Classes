<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Service Request</title>
    <style>
        body { font-family: sans-serif; padding: 20px; color: #333; }
        form { max-width: 450px; margin: auto; padding: 20px; border-left: 5px solid #007bff; background: #fafafa; }
        div { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>

    <form>
        <h2>Service Request Form</h2>
        
        <div>
            <label for="custName">Customer Name</label>
            <input type="text" id="custName" name="customerName" required>
        </div>

        <div>
            <label for="phone">Contact Number</label>
            <input type="tel" id="phone" name="contactNumber" pattern="[0-9]{10}" placeholder="10-digit mobile" required>
        </div>

        <div>
            <label for="issue">Issue Type</label>
            <select id="issue" name="issueType" required>
                <option value="laptop">Laptop Repair</option>
                <option value="internet">Internet Issue</option>
                <option value="software">Software Installation</option>
            </select>
        </div>

        <div>
            <label for="desc">Description</label>
            <textarea id="desc" name="issueDescription" required></textarea>
        </div>

        <div>
            <label>Priority</label>
            <select name="priority">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
        </div>

        <button type="submit" style="background:#007bff; color:white; border:none; padding:10px 20px; cursor:pointer;">Submit Ticket</button>
    </form>

</body>
</html>
